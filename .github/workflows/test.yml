name: Test Docker Image

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image locally
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: false
        load: true
        platforms: linux/amd64
        tags: mixscale:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run environment and package verification
      run: |
        docker run --rm \
          -v ${{ github.workspace }}/tests:/tests:ro \
          mixscale:test \
          Rscript /tests/verify_env.R
